{% extends 'basic.html' %}
{% block title %}Chatbot{% endblock %}
{% block body %}
<div class="container-fluid pt-1">
    <div class="container pt-5">
        <div class="row">
            <div class="col-lg-8 mb-5">
                <h1 class="display-4 text-uppercase mb-5">Chat with our Assistant</h1>
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        Chat
                    </div>
                    <div class="card-body" id="chat-box" style="height: 500px; overflow-y: auto;">
                        {% for message in chat_messages %}
                            <div class="chat-message user-message">
                                {{ message.message }}
                            </div>
                            <div class="chat-message bot-message">
                                {{ message.response }}
                            </div>
                        {% endfor %}
                    </div>
                    <div class="card-footer">
                        <form id="chat-form">
                            <div class="input-group">
                                <input type="text" id="message-input" class="form-control" placeholder="Type your message...">
                                <div class="input-group-append">
                                    <button type="submit" class="btn btn-primary">Send</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.chat-message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    margin-bottom: 10px;
    clear: both;
}

.user-message {
    background-color: #DCF8C6;
    float: right;
    text-align: right;
}

.bot-message {
    background-color: #F1F0F0;
    float: left;
    text-align: left;
}
</style>

<script>
    document.getElementById('chat-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const messageInput = document.getElementById('message-input');
        const message = messageInput.value;
        const chatBox = document.getElementById('chat-box');

        if (message.trim() === '') {
            return;
        }

        // Add user message to chat box
        const userMessageDiv = document.createElement('div');
        userMessageDiv.classList.add('chat-message', 'user-message');
        userMessageDiv.innerText = message;
        chatBox.appendChild(userMessageDiv);

        // Clear input
        messageInput.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // Send message to backend
        fetch('/chatbot_api', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {
            const chatbotResponseDiv = document.createElement('div');
            chatbotResponseDiv.classList.add('chat-message', 'bot-message');
            chatbotResponseDiv.innerText = data.response;
            chatBox.appendChild(chatbotResponseDiv);
        })
        .catch(error => {
            console.error('Error:', error);
        });
    });
</script>
{% endblock %}
